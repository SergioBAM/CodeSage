services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codesage-db
    environment:
      POSTGRES_USER: codesage
      POSTGRES_PASSWORD: codesage
      POSTGRES_DB: codesage
    ports:
      - "5432:5432"
    volumes:
      - codesage-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  codesage-pgdata: