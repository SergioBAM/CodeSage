<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeSage</title>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f4;
      color: #1c1c1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    .shell {
      background: #fff;
      border: 0.5px solid #e0ded8;
      border-radius: 12px;
      width: 100%;
      max-width: 760px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      border-bottom: 0.5px solid #e0ded8;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #639922;
    }

    header span { font-size: 15px; font-weight: 500; }
    header small { font-size: 12px; color: #888; margin-left: 4px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    .bubble-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500;
      flex-shrink: 0;
    }

    .avatar.user { background: #dbeafe; color: #1d4ed8; }
    .avatar.bot  { background: #ede9fe; color: #6d28d9; }

    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 0 8px 8px 8px;
      font-size: 14px;
      line-height: 1.6;
      background: #f5f5f4;
    }

    .bubble p { margin: 0 0 0.5em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background: #e8e8e6;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; color: inherit; }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .source-badge {
      font-size: 11px;
      color: #888;
      padding: 3px 8px;
      border: 0.5px solid #e0ded8;
      border-radius: 4px;
    }

    .thinking {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: #f5f5f4;
      border-radius: 0 8px 8px 8px;
    }

    .thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    footer {
      padding: 12px 16px;
      border-top: 0.5px solid #e0ded8;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    footer input {
      flex: 1;
      padding: 9px 14px;
      border: 0.5px solid #e0ded8;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    footer input:focus { border-color: #a5b4fc; }

    footer button {
      padding: 9px 18px;
      border: 0.5px solid #e0ded8;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
    }

    footer button:hover { background: #f5f5f4; }
    footer button:active { transform: scale(0.98); }

    .htmx-request footer button { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
    <div class="shell">
    <header>
        <div class="status-dot"></div>
        <span>CodeSage</span>
        <small>dev assistant</small>
    </header>

    <div id="messages">
        <div class="empty-state">Ask a question about your codebase</div>
    </div>

    <footer>
        <input
            type="text"
            id="question-input"
            name="question"
            placeholder="Ask a question about your codebase..."
            autocomplete="off"
        />
        <button id="ask-btn">Ask</button>
    </footer>
    </div>
    <script>
        const input = document.getElementById('question-input');
        const btn = document.getElementById('ask-btn');
        const messages = document.getElementById('messages');

        function scrollBottom() {
            messages.scrollTop = messages.scrollHeight;
        }

        function removeEmptyState() {
            const empty = messages.querySelector('.empty-state');
            if (empty) empty.remove();
        }

        function appendThinking(question) {
            removeEmptyState();
            messages.insertAdjacentHTML('beforeend', `
            <div class="bubble-row">
                <div class="avatar user">U</div>
                <div class="bubble">${question.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
            </div>
            <div id="thinking" class="bubble-row">
                <div class="avatar bot">CS</div>
                <div class="thinking">
                <span></span><span></span><span></span>
                </div>
            </div>`);
            scrollBottom();
        }

        btn.addEventListener('click', function () {
            const question = input.value.trim();
            if (!question) return;

            appendThinking(question);
            input.value = '';
            btn.disabled = true;

            // retarget htmx now that #thinking exists in the DOM
            htmx.ajax('POST', '/ui/query',  {
            target: '#thinking',
            swap: 'outerHTML',
            values: { question: question }
            }).then(function () {
            btn.disabled = false;
            input.focus();
            scrollBottom();
            });
        });

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
